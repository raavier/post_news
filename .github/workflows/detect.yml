name: Detectar novidades Databricks

on:
  schedule:
    # Diariamente às 12:00 UTC (09:00 BRT). Ajuste se quiser outro horário.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Só imprimir (não cria issues)"
        type: boolean
        default: false
      limit:
        description: "Teto global de novidades por execução (vazio = sem teto)"
        required: false
        default: ""
      backfill:
        description: "Backfill: recuperar histórico recente (ignora o baseline)"
        type: boolean
        default: false
      days:
        description: "Backfill: janela em dias (padrão 14)"
        required: false
        default: "14"
      per_brand:
        description: "Backfill: máximo de itens por marca (padrão 5)"
        required: false
        default: "5"

permissions:
  contents: write   # para commitar state/seen.json
  issues: write     # para criar as issues de rascunho

concurrency:
  group: detect
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Fallback (só usado se o Gemini falhar):
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_BASE_URL: ${{ secrets.DATABRICKS_BASE_URL }}
      DATABRICKS_MODEL: ${{ secrets.DATABRICKS_MODEL }}
      DATABRICKS_MAX_CALLS: ${{ secrets.DATABRICKS_MAX_CALLS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # WeasyPrint (carrossel PDF) precisa das libs nativas Pango/Cairo.
      - name: Instalar libs nativas do WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - run: pip install -r requirements.txt

      # --- DRY-RUN: só imprime, não cria nada ---
      - name: Dry-run
        if: ${{ inputs.dry_run == true }}
        env:
          IN_LIMIT: ${{ inputs.limit }}
          IN_BACKFILL: ${{ inputs.backfill }}
          IN_DAYS: ${{ inputs.days }}
          IN_PER_BRAND: ${{ inputs.per_brand }}
        run: |
          ARGS=""
          if [ -n "$IN_LIMIT" ]; then ARGS="$ARGS --limit $IN_LIMIT"; fi
          if [ "$IN_BACKFILL" = "true" ]; then ARGS="$ARGS --backfill --days $IN_DAYS --per-brand $IN_PER_BRAND"; fi
          python -m post_news.run_detect --dry-run $ARGS

      # --- FASE 1: gera texto e renderiza os cards em drafts/ ---
      - name: Preparar rascunhos (texto + cards)
        if: ${{ inputs.dry_run != true }}
        env:
          IN_LIMIT: ${{ inputs.limit }}
          IN_BACKFILL: ${{ inputs.backfill }}
          IN_DAYS: ${{ inputs.days }}
          IN_PER_BRAND: ${{ inputs.per_brand }}
        run: |
          ARGS=""
          if [ -n "$IN_LIMIT" ]; then ARGS="$ARGS --limit $IN_LIMIT"; fi
          if [ "$IN_BACKFILL" = "true" ]; then ARGS="$ARGS --backfill --days $IN_DAYS --per-brand $IN_PER_BRAND"; fi
          python -m post_news.run_detect --prepare $ARGS

      # --- Publica os cards no repo ANTES de criar as issues (para a raw URL resolver) ---
      - name: Commitar cards
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts/
          if git diff --cached --quiet; then
            echo "Sem cards novos."
          else
            git commit -m "chore: adiciona cards das novidades"
            git push
          fi

      # --- FASE 2: cria as issues (raw URL já resolve) e atualiza o estado ---
      - name: Criar issues
        if: ${{ inputs.dry_run != true }}
        run: python -m post_news.run_detect --create-issues

      - name: Commitar estado atualizado
        # always() para persistir o progresso mesmo se um passo anterior falhar.
        if: ${{ always() && inputs.dry_run != true }}
        run: |
          if [ -n "$(git status --porcelain state/seen.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: atualiza estado de novidades processadas"
            git push
          else
            echo "Sem mudanças no estado."
          fi
